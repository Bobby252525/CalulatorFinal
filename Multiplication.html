<!DOCTYPE html>
<html lang="en">
<style>
    body {
        background-color: green;
    }
    u {
        display: block;
        font-size: 40px;
        color: white;
    }
    p {
        display: block;
        font-size: 30px;
        color: white;
    }
</style>
<body>
    <u style="display: block; text-align: center;">MULTIPLICATION CALCULATOR: </u>
    <p>A: <input type="number" id="num1" oninput="solution()" style="font-size: 30px;"></p>
    <p>B: <input type="number" id="num2" oninput="solution()" style="font-size: 30px;"></p>
    <p>Solution: <output id="solution"></output></p>
    <p>For Addition click <a href="index.html">here</a></p>
    <p>For Division click <a href="division.html">here</a></p>
    <button onclick="window.location.href='Subtraction.html'" style="font-size: 30px;">Subtraction</button>
</body>
</html>
<script>
    function solution() {
        let num1 = Number(document.getElementById("num1").value);
        let num2 = Number(document.getElementById("num2").value);
        document.getElementById("solution").value = num1 * num2;
    }
</script>
