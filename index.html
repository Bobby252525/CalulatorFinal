<!DOCTYPE html>
<html lang="en">
    <style>
        body {
            background-color: darkblue;
        }
        u {
            color: white;
            font-size: 40px;
            display: block;
            font-family: "Times New Roman", serif;
        }
        p {
            color: white;
            display: block;
            font-size: 30px;
        }
    </style>
<body>
    <u style="display: block; text-align: center;">ADDITION CALCULATOR: </u>
    <p>A: <input type="number" id="num1" oninput="solution()" style="font-size: 30px;"></p>
    <p>B: <input type="number" id="num2" oninput="solution()" style="font-size: 30px;"></p>
    <p>Solution: <output id="solution"></output></p>
    <p>For Multiplication click <a href="Multiplication.html">here</a></p>
    <p>For Subtraction click <a href="Subtraction.html">here</a></p>
    <button onclick="window.location.href='Division.html'" style="font-size: 30px;">Division</button>
</body>
</html>
<script>
    function solution() {
        let num1 = Number(document.getElementById("num1").value);
        let num2 = Number(document.getElementById("num2").value);
        document.getElementById("solution").value = num1 + num2;
    }
</script>
