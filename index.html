<!DOCTYPE html>
<html lang="en">
<body>
    <u style="display: block; text-align: center;">ADDITION CALCULATOR: </u>
    <p>A: <input type="number" id="num1" oninput="solution()"></p>
    <p>B: <input type="number" id="num2" oninput="solution()"></p>
    <p>Solution: <output id="solution"></output></p>
    <p>For Multiplication click <a href="multiplication.html">here</a></p>
    <p>For Subtraction click <a href="Subtraction.html">here</a></p>
    <button onclick="window.location.href='Division.html'">Division</button>
</body>
</html>
<script>
    function solution() {
        let num1 = Number(document.getElementById("num1").value);
        let num2 = Number(document.getElementById("num2").value);
        document.getElementById("solution").value = num1 + num2;
    }
</script>
